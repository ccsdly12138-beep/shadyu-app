<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English SaaS App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
}
.app{width:100%;max-width:420px;padding:20px;}
.card{
background:#1f2937;
padding:20px;
border-radius:16px;
margin-top:20px;
text-align:center;
}
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
box-sizing: border-box; /* 防止输入框超出边界 */
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
.blue{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.gray{background:#374151;color:white;}
.word{font-size:34px;font-weight:bold;}
</style>
</head>
<body>
<div class="app">
<div class="card" id="loginBox">
<h2>📚 English SaaS App</h2>
<input id="email" type="email" placeholder="输入邮箱">
<input id="password" type="password" placeholder="输入密码 (至少6位)">

<button class="blue" onclick="login()">立即登录</button>
<button class="gray" onclick="signUp()" style="font-size:14px; opacity:0.8;">没有账号？去注册</button>

<div id="msg" style="margin-top:10px;font-size:13px;color:#a5b4fc;"></div>
</div>

<div class="card" id="appBox" style="display:none">
<div class="word" id="word">loading</div>
<button class="blue" onclick="speak()">🔊 发音</button>
<button class="green" onclick="rec()">🎤 跟读</button>
<button class="gray" onclick="nextWord()">下一个</button>
<div id="score"></div>
</div>
</div>

<script>
// 🔴 改成你的 Supabase 真实配置
const supabase = window.supabase.createClient(
"https://mtxoggmczoykokkpmsay.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eG9nZ21jem95a29ra3Btc2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNzQ1OTIsImV4cCI6MjA5NTk1MDU5Mn0.AhdjWcHhvcVIQ7808nPhthQipQ4sTZb0aOXljkmzR3Y"
);

// 单词
const words = [
"abandon", "benefit", "challenge", "develop", "efficient",
"focus", "generate", "improve", "maintain", "strategy"
];
let i = 0;
let user = null;

// ================= 1. 账号密码登录 =================
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    
    if(!email || !password) {
        alert("请填写邮箱和密码");
        return;
    }
    
    document.getElementById("msg").innerText = "正在登录...";
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password,
    });

    if(error){
        console.error(error);
        document.getElementById("msg").innerText = "❌ 登录失败: " + error.message;
    } else {
        document.getElementById("msg").innerText = "✅ 登录成功！";
        checkUser(); // 刷新界面状态
    }
}

// ================= 2. 账号密码注册 =================
async function signUp(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    
    if(!email || !password) {
        alert("请填写邮箱和密码");
        return;
    }
    
    document.getElementById("msg").innerText = "正在注册...";
    
    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password,
    });

    if(error){
        console.error(error);
        document.getElementById("msg").innerText = "❌ 注册失败: " + error.message;
    } else {
        document.getElementById("msg").innerText = "✅ 注册成功！已直接登录。";
        checkUser();
    }
}

// ================= 3. 检查登录状态 =================
async function checkUser(){
    const { data } = await supabase.auth.getUser();
    if(data && data.user){
        user = data.user;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("appBox").style.display = "block";
        
        // 如果你定义了渲染单词的函数，可以在这里解开注释
        // if (typeof nextWord === "function") nextWord(); 
    }
}

// ================= 4. PWA Service Worker 注册 =================
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(reg => console.log("Service Worker 注册成功:", reg.scope))
      .catch(err => console.log("Service Worker 注册失败:", err));
  });
}

// 页面加载时自动检查登录状态
checkUser();
</script>
</body>
</html>
