<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English SaaS App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
.app { width: 100%; max-width: 420px; padding: 20px; }
.card {
  background: #1f2937;
  padding: 28px 24px;
  border-radius: 16px;
  margin-top: 20px;
  text-align: center;
}
.card h2 { margin-bottom: 16px; font-size: 22px; }
input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #111827;
  color: white;
  font-size: 15px;
  margin-top: 10px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #3b82f6; }
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
button:active { transform: scale(0.98); opacity: 0.85; }
.blue  { background: #3b82f6; color: white; }
.green { background: #22c55e; color: white; }
.gray  { background: #374151; color: #d1d5db; }
.red   { background: #ef4444; color: white; }
.word  { font-size: 38px; font-weight: bold; margin: 12px 0 6px; letter-spacing: 1px; }
.phonetic { color: #94a3b8; font-size: 15px; margin-bottom: 12px; }
#score { margin-top: 14px; font-size: 14px; color: #a5b4fc; min-height: 20px; }
#msg   { margin-top: 12px; font-size: 13px; color: #a5b4fc; min-height: 18px; }
.progress {
  width: 100%;
  background: #374151;
  border-radius: 999px;
  height: 6px;
  margin: 14px 0 4px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: #3b82f6;
  border-radius: 999px;
  transition: width 0.4s ease;
}
.word-count { font-size: 12px; color: #6b7280; margin-bottom: 10px; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-row button { margin-top: 0; }
</style>
</head>
<body>
<div class="app">

  <!-- 登录/注册框 -->
  <div class="card" id="loginBox">
    <h2>📚 English SaaS App</h2>
    <input id="username" type="text" placeholder="输入账号">
    <input id="password" type="password" placeholder="输入密码（至少6位）">
    <button class="blue"  onclick="login()">立即登录</button>
    <button class="gray"  onclick="signUp()" style="font-size:14px;">没有账号？去注册</button>
    <div id="msg"></div>
  </div>

  <!-- 学习主界面 -->
  <div class="card" id="appBox" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:13px;color:#6b7280" id="userLabel"></span>
      <button class="red" onclick="logout()" style="width:auto;padding:6px 14px;font-size:13px;margin:0;">退出</button>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="word-count" id="wordCount"></div>

    <div class="word" id="word">—</div>
    <div class="phonetic" id="phonetic"></div>

    <div class="btn-row">
      <button class="blue"  onclick="speak()">🔊 发音</button>
      <button class="green" onclick="rec()">🎤 跟读</button>
    </div>
    <button class="gray" onclick="nextWord()">下一个 →</button>

    <div id="score"></div>
  </div>

</div>

<script>
// =========================================================
// 1. Supabase 初始化（变量名改为 sb，避免与 CDN 冲突）
// =========================================================
const sb = window.supabase.createClient(
  "https://mtxoggmczoykokkpmsay.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eG9nZ21jem95a29ra3Btc2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNzQ1OTIsImV4cCI6MjA5NTk1MDU5Mn0.AhdjWcHhvcVIQ7808nPhthQipQ4sTZb0aOXljkmzR3Y"
);

// =========================================================
// 2. 单词库
// =========================================================
const words = [
  { word: "abandon",    phonetic: "/əˈbændən/" },
  { word: "benefit",    phonetic: "/ˈbenɪfɪt/" },
  { word: "challenge",  phonetic: "/ˈtʃælɪndʒ/" },
  { word: "develop",    phonetic: "/dɪˈveləp/" },
  { word: "efficient",  phonetic: "/ɪˈfɪʃnt/" },
  { word: "focus",      phonetic: "/ˈfoʊkəs/" },
  { word: "generate",   phonetic: "/ˈdʒenəreɪt/" },
  { word: "improve",    phonetic: "/ɪmˈpruːv/" },
  { word: "maintain",   phonetic: "/meɪnˈteɪn/" },
  { word: "strategy",   phonetic: "/ˈstrætədʒi/" },
];

let idx = 0;
let currentUser = null;

// =========================================================
// 3. 登录
// =========================================================
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) { alert("请填写账号和密码"); return; }

  setMsg("正在登录...");
  const { data, error } = await sb.auth.signInWithPassword({
    email: `${username}@app.internal`,
    password,
  });
  if (error) {
    setMsg("❌ 登录失败：" + error.message);
  } else {
    setMsg("✅ 登录成功！");
    enterApp(data.user);
  }
}

// =========================================================
// 4. 注册
// =========================================================
async function signUp() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) { alert("请填写账号和密码"); return; }
  if (password.length < 6)    { alert("密码至少6位");       return; }

  setMsg("正在注册...");
  const { data, error } = await sb.auth.signUp({
    email: `${username}@app.internal`,
    password,
  });
  if (error) {
    setMsg("❌ 注册失败：" + error.message);
  } else {
    setMsg("✅ 注册成功，已自动登录！");
    enterApp(data.user);
  }
}

// =========================================================
// 5. 退出
// =========================================================
async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById("appBox").style.display  = "none";
  document.getElementById("loginBox").style.display = "block";
  setMsg("");
}

// =========================================================
// 6. 进入主界面
// =========================================================
function enterApp(user) {
  if (!user) return;
  currentUser = user;
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display   = "block";
  // 显示账号（去掉 @app.internal 后缀）
  const label = (user.email || "").replace("@app.internal", "");
  document.getElementById("userLabel").innerText = "👤 " + label;
  idx = 0;
  showWord();
}

// =========================================================
// 7. 检查已有登录状态（页面刷新后自动恢复）
// =========================================================
async function checkUser() {
  const { data } = await sb.auth.getUser();
  if (data && data.user) enterApp(data.user);
}

// =========================================================
// 8. 单词展示
// =========================================================
function showWord() {
  const total = words.length;
  const current = words[idx];
  document.getElementById("word").innerText     = current.word;
  document.getElementById("phonetic").innerText = current.phonetic;
  document.getElementById("wordCount").innerText = `${idx + 1} / ${total}`;
  document.getElementById("progressBar").style.width = ((idx + 1) / total * 100) + "%";
  document.getElementById("score").innerText = "";
}

function nextWord() {
  idx = (idx + 1) % words.length;
  showWord();
}

// =========================================================
// 9. 发音
// =========================================================
function speak() {
  const utter = new SpeechSynthesisUtterance(words[idx].word);
  utter.lang = "en-US";
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

// =========================================================
// 10. 跟读（语音识别）
// =========================================================
function rec() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("score").innerText = "⚠️ 您的浏览器不支持语音识别";
    return;
  }
  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  document.getElementById("score").innerText = "🎤 正在听...";

  recognition.onresult = (event) => {
    const said = event.results[0][0].transcript.trim().toLowerCase();
    const target = words[idx].word.toLowerCase();
    if (said === target) {
      document.getElementById("score").innerText = `✅ 读对了！你说的：「${said}」`;
    } else {
      document.getElementById("score").innerText = `❌ 再试一次！你说的：「${said}」，目标：「${target}」`;
    }
  };
  recognition.onerror = (e) => {
    document.getElementById("score").innerText = "⚠️ 识别失败：" + e.error;
  };
  recognition.start();
}

// =========================================================
// 11. 工具函数
// =========================================================
function setMsg(text) {
  document.getElementById("msg").innerText = text;
}

// =========================================================
// 12. PWA Service Worker
// =========================================================
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(reg => console.log("SW 注册成功:", reg.scope))
      .catch(err => console.warn("SW 注册失败:", err));
  });
}

// 自动恢复登录状态
checkUser();
</script>
</body>
</html>
