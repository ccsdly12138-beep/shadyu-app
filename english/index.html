<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>每日英语</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
</head>
<body>

  <div class="card" id="wordCard" style="display:none">
    <div class="top-bar">
      <span class="badge" id="progress"></span>
      <span class="streak" id="streak"></span>
    </div>
    <div class="word-section">
      <div class="word" id="word"></div>
      <div class="phonetic" id="phonetic"></div>
      <div class="translation" id="translation"></div>
    </div>
    <div class="sound-row">
      <button class="btn-sound" onclick="speakUS()">🔊 🇺🇸 美式</button>
      <button class="btn-sound" onclick="speakUK()">🔊 🇬🇧 英式</button>
    </div>
    <div class="action-row">
      <button class="btn-know" onclick="markKnown()">✅ 我会了</button>
      <button class="btn-review" onclick="markUnknown()">📌 再复习</button>
    </div>
  </div>

  <div class="card" id="doneMsg" style="display:none">
    <div class="done-msg">
      <h2>🎉 今日完成！</h2>
      <p>已学完今天的 10 个单词</p>
      <p style="margin-top:8px">明天继续加油 💪</p>
    </div>
  </div>

  <a href="../index.html" class="back-link">← 返回首页</a>

  <script src="words.js"></script>
  <script src="app.js"></script>
  <script>
    window._supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        document.getElementById('wordCard').style.display = 'block';
        showWord();
      } else {
        window.location.href = '../index.html';
      }
    });
  </script>
</body>
</html>
