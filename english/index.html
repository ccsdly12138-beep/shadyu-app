<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>每日英语</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
</head><body>
<div class="container">
  <a href="../index.html" class="back">← 返回首页</a>
  <h1>每日英语</h1>

  <div id="app" style="display:none">
    <p id="progress" class="progress"></p>
    <h2 id="word"></h2>
    <p id="translation" class="translation"></p>
    <div class="btn-row">
      <button onclick="speakWord()">🔊 发音</button>
      <button id="accentBtn" onclick="toggleAccent()">🇺🇸 美式</button>
    </div>
    <div class="btn-row">
      <button class="known" onclick="markKnown()">✅ 我会</button>
      <button class="unknown" onclick="markUnknown()">❌ 不会</button>
    </div>
  </div>
</div>

<script src="words.js"></script>
<script src="app.js"></script>
<script>
  // 检查登录状态，未登录跳回主页
  window._supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      document.getElementById('app').style.display = 'block';
      showWord();
    } else {
      window.location.href = '../index.html';
    }
  });
</script>
</body></html>
