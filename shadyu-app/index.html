<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link href="styles/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <title>沙丁鱼</title>
  </head>
  <body>

    <!-- 登录界面 -->
    <div id="loginPage">
      <div class="login-box">
        <img src="images/沙丁鱼.png" width="64" height="64">
        <h2>欢迎回来</h2>
        <input id="email" type="email" placeholder="邮箱">
        <input id="password" type="password" placeholder="密码">
        <button onclick="login()">登录 / 注册</button>
        <p id="loginMsg"></p>
      </div>
    </div>

    <!-- 主页（登录后显示） -->
    <div id="mainPage" style="display:none">
      <div id="first">
        <nav>
          <img src="images/沙丁鱼.png" width="32" height="32">
          <ul>
            <li><a href="english/index.html">每日英语</a></li>
            <li><a href="">工作记录</a></li>
            <li><a href="">知识沉淀</a></li>
            <li><a href="">目标追踪</a></li>
            <li><a href="">收藏整理</a></li>
            <li><a href="">小游戏集</a></li>
            <li><a href="#" onclick="logout()">退出</a></li>
          </ul>
        </nav>
      </div>
      <img src="images/沙丁鱼.png" alt="My test image" />
    </div>

    <script>
      async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const msg = document.getElementById('loginMsg');
        if (!email || !password) { msg.textContent = '请输入邮箱和密码'; return; }

        const { error } = await window._supabase.auth.signInWithPassword({ email, password });
        if (error) {
          const { error: signUpError } = await window._supabase.auth.signUp({ email, password });
          if (signUpError) {
            if (signUpError.message.includes('already registered')) {
              msg.textContent = '密码错误，请重试';
            } else {
              msg.textContent = '失败: ' + signUpError.message;
            }
          }
        }
      }

      async function logout() {
        await window._supabase.auth.signOut();
      }

      window._supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('mainPage').style.display = 'block';
        } else {
          document.getElementById('loginPage').style.display = 'flex';
          document.getElementById('mainPage').style.display = 'none';
        }
      });
    </script>
  </body>
</html>
