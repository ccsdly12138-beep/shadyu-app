<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>English App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head><body>
<div class="container">
  <h1>English App</h1>
  <p class="subtitle">每日10词学习</p>

  <div id="login">
    <input id="email" type="email" placeholder="邮箱">
    <input id="password" type="password" placeholder="密码">
    <button onclick="login()">登录 / 注册</button>
  </div>

  <div id="app" style="display:none">
    <p id="progress" class="progress"></p>
    <h2 id="word"></h2>
    <p id="translation" class="translation"></p>
    <div class="btn-row">
      <button onclick="speakWord()">🔊 发音</button>
      <button id="accentBtn" onclick="toggleAccent()">🇺🇸 美式</button>
    </div>
    <div class="btn-row">
      <button class="known" onclick="markKnown()">✅ 我会</button>
      <button class="unknown" onclick="markUnknown()">❌ 不会</button>
    </div>
    <button class="logout" onclick="logout()">退出登录</button>
  </div>
</div>

<script src="words.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }
</script>
</body></html>
